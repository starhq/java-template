# ==========================================
# Common Parameter Validation
# ==========================================
error.param.format=Invalid parameter format, please check the data type and try again
error.validation=Parameter validation failed
error.enum.format=Invalid enum type, valid options are: [{0}]
error.not_found=[{0}] Not Found
error.method.not_support=Method [{0}] is not supported. Supported methods: [{1}]
error.param.blank={0} is required
error.param.range=Length must be between [{0}] and [{1}] characters
error.param.min=The value cannot be less than {0}
error.param.max=The value cannot exceed {0}
error.password.mismatch=Incorrect password
error.password.same=New password must be different from the old one

error.query.format=Invalid parameter [{0}], please check and retry
error.password.weak=Password is too weak. Must contain uppercase, lowercase, numbers, and special characters

# ==========================================
# Authentication & Authorization Errors
# ==========================================
# General Auth Failure
error.auth.unauthorized=Unauthenticated, please log in

# Login
error.auth.credentials=Incorrect username or password

# Password Reset
error.auth.password.failed=Password modification failed

# Token Errors (Consolidated)
error.auth.token.missing=Authentication Token is missing
error.auth.token.invalid=Token is invalid or signature verification failed
error.auth.token.expired=Token has expired, please log in again
error.auth.token.refresh.invalid=Refresh Token is invalid
error.auth.token.access.invalid=Access Token is invalid

# Session Errors
error.auth.session.invalid=Session is invalid or revoked, please log in again
error.auth.session.expired=Session has expired, please log in again

# Security Interception
error.auth.fingerprint.missing=Device fingerprint is missing
error.auth.device.mismatch=Device environment changed for security, please log in again

# Status Errors
error.auth.disabled=Account is disabled
error.auth.no_roles=No roles assigned to the user
error.auth.forbidden=Access Denied

# Captcha Errors
error.auth.captcha.failed=Captcha generation failed
error.auth.captcha.verify=The verification code failed to pass validation
error.auth.captcha.often=The verification code request is too frequent
error.auth.captcha.banned=You are banned, Please try again in 15 minutes
error.auth.captcha.expired=Captcha is expired

