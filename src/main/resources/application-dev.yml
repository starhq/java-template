spring:
  jackson:
    serialization:
      fail-on-empty-beans: true

  datasource:
    hikari:
      # 1.  Maximum connections: Determines the peak capacity of the system to handle concurrent transactions
      # Recommendations for 8-core machines: 20-30. If your SQL is extremely fast, you can set it to 50-100.
      # If it is a 4-core machine, 10-20 is recommended.
      maximum-pool-size: 30
      # 2.  Minimum idle connections:
      # Recommendation: Set it to 50% of the maximum-pool-size.
      # Function: To avoid the overhead of creating connections temporarily when traffic peaks arrive.
      minimum-idle: 15
      # 3.  Connection timeout: The application requests a connection from the connection pool and waits for up to 30 seconds
      # If a connection is not established within 30 seconds, throw an exception directly to avoid the request being stuck.
      connection-timeout: 30000
      # 4.  Idle timeout: A connection will be reclaimed if it remains idle and unused for 10 minutes.
      # Avoid connections being forcibly closed by the database server (such as due to wait_timeout).
      idle-timeout: 600000
      # 5.  Maximum connection lifetime:
      # Forcibly recycle connections that have been used for 30 minutes.
      # Purpose: To prevent memory leaks, cursor accumulation, or metadata changes becoming unsynchronized due to the prolonged reuse of the same connection.
      max-lifetime: 1800000
      # 6.  Connection test query:
      # This is one of the most crucial settings.
      # When retrieving a connection from the connection pool, execute this SQL to confirm that the connection is alive.
      # SELECT 1 has the best universality and the lowest performance overhead.
      connection-test-query: SELECT 1
      # 7.  Validation timeout:
      # Timeout for executing the connection-test-query. It is recommended to keep it short to quickly determine whether the connection is good or not.
      validation-timeout: 5000
      # 8.  Leak detection threshold: ⭐⭐⭐
      # If a connection is lent out for more than 60 seconds and not returned, it is considered a "leak".
      # The log will print stack warnings to help you locate the places in the code where you forgot to close.
      leak-detection-threshold: 60000
      # 9.  Initialize SQL:
      # SQL executed each time a new physical connection is created.
      # It is highly suitable for setting environment variables such as time zones and schemas.
      connection-init-sql: "SET TIME ZONE 'Asia/Shanghai'; SET search_path TO public;"

  flyway:
    table: app_schema_history
    baseline-on-migrate: true
    validate-on-migrate: true
    enabled: true
    clean-disabled: false # only false in dev profile

  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
            required: true

  messages:
    basename: i18n/messages
    encoding: UTF-8

star:
  jwt:
    # 强烈建议使用环境变量，避免密钥泄露
    key: ${JWT_KEY}
    access: 30m
    refresh: 336h

  white-list:
    - /auth/login
    - /auth/register
    - /auth/refresh
    - /auth/captcha
    - /auth/reset-password

  cors:
    allowed-origin-patterns:
      - "https://your-frontend-domain.com"
      - "http://localhost:3000"
      - "http://localhost:8080"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
